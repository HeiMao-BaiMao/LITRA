  - "**/.serena"
  - "**/.serena/**"
  - "**/.vscode"
  - "**/.vscode/**"
  - "**/vendor"
  - "**/vendor/**"
  - "**/__pycache__"
  - "**/__pycache__/**"
  - "**/*.lock"
  - "**/*.log"
  - "**/*.db"
  - "**/*.sqlite"
  - "**/*.sqlite3"
  - "**/*.png"
