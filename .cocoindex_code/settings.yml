include_patterns:
  - "AGENTS.md"
  - "README.md"
  - "package.json"
  - "tsconfig.json"
  - "vite.config.ts"
  - "Trunk.toml"
  - "*.html"
  - "src/**/*.ts"
  - "src/**/*.tsx"
  - "src/**/*.css"
  - "src/**/*.json"
  - "src-tauri/**/*.rs"
