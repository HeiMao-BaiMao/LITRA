<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ジャンルライブラリ - Phenex</title>
    <script type="module" src="/src/genre-library-window.ts" defer></script>
  </head>

  <body class="detachable-window">
    <div id="genre-library-app" class="genre-library-app">
      <aside id="sidebar" class="genre-sidebar">
        <div class="genre-sidebar-header">
          <h2>ジャンル</h2>
          <button id="btn-new-genre" type="button" title="新規ジャンル">＋</button>
        </div>
        <div id="genre-list" class="genre-list"></div>
        <div id="genre-list-spinner" class="spinner hidden"></div>
      </aside>

      <main class="genre-main">
        <header class="genre-toolbar">
          <button id="sidebar-toggle" type="button" class="sidebar-toggle" title="サイドバー">☰</button>
          <nav class="genre-tabs">
            <button id="tab-overview" type="button" class="active">概要</button>
            <button id="tab-sources" type="button">資料</button>
            <button id="tab-analysis" type="button">分析</button>
            <button id="tab-knowledge" type="button">知識</button>
          </nav>
          <div class="genre-toolbar-actions">
            <button id="btn-import-source" type="button">＋ 資料</button>
            <button id="btn-analyze-source" type="button">分析</button>
            <button id="btn-open-genre-chat" type="button">AIチャット</button>
          </div>
        </header>

        <section id="main-content" class="genre-main-content">
          <p class="empty-state">ジャンルを選択するか、新規作成してください。</p>
        </section>

        <div id="analysis-status" class="analysis-status"></div>
        <div id="analysis-spinner" class="spinner hidden"></div>
      </main>
    </div>
  </body>
</html>
