<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="/LITRA.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>リトラチャット - LITRA</title>
  <script type="module" src="/litra-frontend.js" defer></script>
</head>

<body class="detachable-window" data-rust-window="chat">
  <aside class="chat-panel detached">
    <div class="chat-panel-header">
      <h3>リトラチャット</h3>
    </div>
    <div class="chat-settings-row">
      <select id="chat-provider" title="プロバイダー"></select>
      <select id="chat-model" title="モデル"></select>
    </div>
    <div id="chat-messages" class="chat-messages"></div>
    <form id="chat-form" class="chat-form">
      <textarea id="chat-input" class="chat-input" placeholder="リトラと自由に話す..." rows="2"></textarea>
      <div class="chat-controls">
        <button id="btn-direct-writing" type="button" class="direct-writing-toggle" aria-pressed="false" title="多段生成を省略し、チャットモデルから本文へ直接書き込みます">⚡ 直接執筆 OFF</button>
        <button id="btn-send" type="submit">送信</button>
        <button id="btn-cancel" type="button" class="hidden" disabled>
          停止
        </button>
      </div>
    </form>
  </aside>
</body>

</html>
