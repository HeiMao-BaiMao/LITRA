<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/src/styles.css" />
  <link rel="icon" href="/src/assets/LITRA.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="genre-chat-title">ジャンルリトラチャット - LITRA</title>
  <script type="module" src="/src/genre-chat-window.ts" defer></script>
</head>

<body class="detachable-window">
  <div id="genre-chat-app" class="genre-chat-app">
    <aside id="thread-sidebar" class="thread-sidebar">
      <div class="thread-sidebar-header">
        <h2>スレッド</h2>
      </div>
      <div id="thread-list" class="thread-list"></div>
    </aside>

    <main class="genre-chat-main-wrapper">
      <header class="genre-chat-header">
        <h2 id="genre-chat-genre-name">ジャンルリトラチャット</h2>
      </header>
      <div id="genre-chat-main" class="chat-panel detached">
        <div class="chat-panel-header">
          <h3>リトラチャット</h3>
        </div>
        <div class="chat-settings-row">
          <select id="chat-provider" title="プロバイダー"></select>
          <select id="chat-model" title="モデル"></select>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <form id="chat-form" class="chat-form">
          <textarea id="chat-input" class="chat-input" placeholder="リトラと自由に話す..." rows="2"></textarea>
          <div class="chat-controls has-register-source">
            <button id="btn-register-source" type="button">＋ 資料として登録</button>
            <div class="chat-controls-actions">
              <button id="btn-send" type="submit">送信</button>
              <button id="btn-cancel" type="button" class="hidden" disabled>
                停止
              </button>
            </div>
          </div>
        </form>
      </div>
    </main>
  </div>
</body>

</html>
