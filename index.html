<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phenex - AI 支援小説執筆ツール</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app" class="app">
      <header class="toolbar">
        <div class="toolbar-title">Phenex</div>
        <div class="toolbar-actions">
          <button id="btn-continue" type="button">続きを書く</button>
          <button id="btn-rewrite" type="button">選択部分を書き直す</button>
          <button id="btn-feedback" type="button">選択部分へのフィードバック</button>
          <button id="btn-settings" type="button">設定</button>
        </div>
      </header>

      <main class="main">
        <section class="editor-section">
          <textarea
            id="editor"
            class="editor"
            placeholder="ここから小説を書き始めましょう..."
            spellcheck="false"
          ></textarea>
        </section>

        <aside class="chat-panel">
          <div id="chat-messages" class="chat-messages"></div>
          <form id="chat-form" class="chat-form">
            <textarea
              id="chat-input"
              class="chat-input"
              placeholder="AI と自由に話す..."
              rows="2"
            ></textarea>
            <div class="chat-controls">
              <button id="btn-send" type="submit">送信</button>
              <button id="btn-cancel" type="button" class="hidden" disabled>
                停止
              </button>
            </div>
          </form>
        </aside>
      </main>

      <div id="settings-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-dialog">
          <h2>AI 設定</h2>
          <form id="settings-form" class="settings-form">
            <label>
              <span>API キー</span>
              <input
                id="setting-api-key"
                type="password"
                autocomplete="off"
              />
            </label>
            <label>
              <span>ベース URL</span>
              <input id="setting-base-url" type="url" />
            </label>
            <label>
              <span>モデル名</span>
              <input id="setting-model" type="text" />
            </label>
            <label>
              <span>温度 (temperature)</span>
              <input id="setting-temperature" type="number" step="0.1" min="0" max="2" />
            </label>
            <label>
              <span>最大トークン数 (max tokens)</span>
              <input id="setting-max-tokens" type="number" min="1" max="8192" />
            </label>
            <div class="modal-actions">
              <button id="btn-save-settings" type="submit">保存</button>
              <button id="btn-cancel-settings" type="button">キャンセル</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
